name: 서울 실시간 도시데이터 대시보드 갱신

on:
  schedule:
    # 3시간마다 (UTC). 필요시 cron 조정
    - cron: '0 */3 * * *'
  workflow_dispatch:  # 수동 실행 (대시보드 "지금 수집" 버튼이 이 페이지로 연결)

permissions:
  contents: write

concurrency:
  group: dashboard-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install pandas numpy

      - name: Build dashboard (fetch live data)
        env:
          SEOUL_API_KEY: ${{ secrets.SEOUL_API_KEY }}
        run: |
          python scripts/build_docs.py --generated-at "$(date -u '+%Y-%m-%d %H:%M UTC')"

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "변경 없음"
          else
            git commit -m "chore: 대시보드 자동 갱신 $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            git push
          fi
